<!-- by claude -->

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
    <defs>
        <radialGradient id="glow">
            <stop offset="0%" style="stop-color:#ffeb3b;stop-opacity:0.8"/>
            <stop offset="100%" style="stop-color:#ffd54f;stop-opacity:0"/>
        </radialGradient>
    </defs>

    <!-- 主体：山形代表仙境 -->
    <path d="M 100 40 L 130 90 L 115 90 L 140 120 L 60 120 L 85 90 L 70 90 Z" fill="#558b2f" opacity="0.8"/>

    <!-- 三块梯田 -->
    <ellipse cx="100" cy="120" rx="40" ry="8" fill="#7cb342" stroke="#2e7d32" stroke-width="1.5"/>
    <ellipse cx="100" cy="135" rx="50" ry="10" fill="#7cb342" stroke="#2e7d32" stroke-width="1.5"/>
    <ellipse cx="100" cy="152" rx="60" ry="12" fill="#7cb342" stroke="#2e7d32" stroke-width="1.5"/>

    <!-- 灵气光芒从山顶散发 -->
    <circle cx="100" cy="40" r="20" fill="url(#glow)">
        <animate attributeName="r" values="15;25;15" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="100" cy="40" r="6" fill="#ffd54f"/>
</svg>